<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сообщить о нарушении</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #21A038;
      --green-dark: #178030;
      --green-light: #E8F5EC;
      --bg: #F5F7FA;
      --border: #DDE2EA;
      --text: #1D1D1B;
      --text-muted: #6B7280;
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--green);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #fff; font-weight: 700;
    }
    .logo-text { font-size: 15px; font-weight: 700; }
    .logo-sub { font-size: 11px; color: var(--text-muted); }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .form-control {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px; font-family: var(--font);
      color: var(--text); background: #fff;
      transition: border-color .2s; outline: none;
    }
    .form-control:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-light); }
    .form-control[type="file"] { padding: 9px 14px; font-size: 13px; }
    .required::after { content: ' *'; color: #DC2626; }
    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--green); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 600;
      font-family: var(--font);
      cursor: pointer; transition: background .15s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: var(--green-dark); }
    .btn-submit:disabled { opacity: .55; cursor: not-allowed; }
    .msg {
      margin-top: 16px; padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500;
      display: none;
    }
    .msg--ok { background: var(--green-light); color: var(--green-dark); display: block; }
    .msg--err { background: #FEF2F2; color: #DC2626; display: block; }
    .cell-row { display: flex; gap: 12px; align-items: stretch; }
    .cell-row .cell-toggle { flex: 0 0 auto; display: flex; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: #fff; }
    .cell-toggle button {
      padding: 11px 16px; border: none; background: #fff; font-family: var(--font); font-size: 14px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; transition: background .15s, color .15s;
    }
    .cell-toggle button.active { background: var(--green-light); color: var(--green-dark); }
    .cell-toggle button:first-child { border-right: 1px solid var(--border); }
    .cell-row .form-control { flex: 1; min-width: 0; }
    .cell-fields { display: flex; gap: 8px; align-items: stretch; }
    .cell-fields .form-control { flex: 1; min-width: 0; }
    .cell-fields .form-control.cell-row-num { max-width: 44px; flex: 0 0 44px; text-align: center; }
    .cell-fields .form-control.cell-place-num { max-width: 52px; flex: 0 0 52px; text-align: center; }
    @media (max-width: 640px) {
      body {
        padding: 12px;
      }
      .card {
        max-width: 100%;
        border-radius: 14px;
        padding: 20px 14px;
      }
      .logo {
        margin-bottom: 14px;
      }
      h1 {
        font-size: 18px;
      }
      .subtitle {
        font-size: 12px;
        margin-bottom: 16px;
      }
      .form-group {
        margin-bottom: 12px;
      }
      .form-control {
        min-height: 44px;
        font-size: 16px; /* avoids iOS auto-zoom on input focus */
      }
      .btn-submit {
        min-height: 46px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">СЛ</div>
      <div>
        <div class="logo-text">СберЛогистика</div>
        <div class="logo-sub">Консолидация</div>
      </div>
    </div>
    <h1>Сообщить о нарушении</h1>
    <p class="subtitle">Заполните форму и прикрепите фото</p>

    <form id="form" enctype="multipart/form-data">
      <div class="form-group">
        <label class="required">Место хранения (ячейка)</label>
        <div class="cell-row">
          <div class="cell-toggle" role="group" aria-label="Тип зоны">
            <button type="button" id="cell-type-kds" data-prefix="KDS" title="Сухой">KDS</button>
            <button type="button" id="cell-type-kdh" data-prefix="KDH" title="Холод" class="active">KDH</button>
          </div>
          <div class="cell-fields">
            <input class="form-control cell-row-num" type="text" id="cell-row" placeholder="4" maxlength="1" autocomplete="off" inputmode="numeric" title="Ряд (1 цифра, сохраняется)">
            <input class="form-control cell-place-num" type="text" id="cell-place" placeholder="44" maxlength="2" required autocomplete="off" inputmode="numeric" title="Место в ряду (2 цифры)">
          </div>
        </div>
        <input type="hidden" name="cell" id="cell">
        <small style="display:block;margin-top:4px;color:var(--text-muted);font-size:12px;">Ряд и место в ряду. Итог: <strong id="cell-preview">KDH-</strong></small>
      </div>
      <div class="form-group">
        <label for="barcode" class="required">Штрихкод товара</label>
        <input class="form-control" type="text" id="barcode" name="barcode" inputmode="numeric" placeholder="отсканируй ШК товара" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="employeeName">Ваше имя (необязательно)</label>
        <input class="form-control" type="text" id="employeeName" name="employeeName" placeholder="Петров" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="photo">Фото нарушения (можно несколько)</label>
        <input class="form-control" type="file" id="photo" name="photo" accept="image/*" multiple>
      </div>
      <button type="submit" class="btn-submit" id="btn-submit">Отправить</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    var form = document.getElementById('form');
    var msgEl = document.getElementById('msg');
    var btnSubmit = document.getElementById('btn-submit');

    var cellRow = document.getElementById('cell-row');
    var cellPlace = document.getElementById('cell-place');
    var cellHidden = document.getElementById('cell');
    var cellPreview = document.getElementById('cell-preview');
    var STORAGE_KEY_ROW = 'consolidation_cell_row';
    var STORAGE_KEY_PREFIX = 'consolidation_storage_prefix';
    var STORAGE_KEY_EMPLOYEE_NAME = 'consolidation_employee_name';
    var storagePrefix = localStorage.getItem(STORAGE_KEY_PREFIX) || 'KDH';

    function updateCellPreview() {
      var row = (cellRow && cellRow.value) ? cellRow.value.trim() : '';
      var place = (cellPlace && cellPlace.value) ? cellPlace.value.trim() : '';
      var part = [row, place].filter(Boolean).join('-');
      if (cellPreview) cellPreview.textContent = storagePrefix + (part ? '-' + part : '-');
    }

    (function restoreSaved() {
      var saved = localStorage.getItem(STORAGE_KEY_ROW);
      if (saved && cellRow) cellRow.value = saved;
      var pref = localStorage.getItem(STORAGE_KEY_PREFIX);
      if (pref === 'KDS' || pref === 'KDH') {
        storagePrefix = pref;
        document.querySelectorAll('.cell-toggle button').forEach(function(b) {
          b.classList.toggle('active', b.getAttribute('data-prefix') === pref);
        });
      }
      var savedName = localStorage.getItem(STORAGE_KEY_EMPLOYEE_NAME);
      if (savedName != null && savedName !== '') {
        var nameEl = document.getElementById('employeeName');
        if (nameEl) nameEl.value = savedName;
      }
      updateCellPreview();
    })();

    document.querySelectorAll('.cell-toggle button').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.cell-toggle button').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        storagePrefix = btn.getAttribute('data-prefix') || 'KDH';
        localStorage.setItem(STORAGE_KEY_PREFIX, storagePrefix);
        updateCellPreview();
      });
    });
    if (cellRow) { cellRow.addEventListener('input', updateCellPreview); cellRow.addEventListener('change', updateCellPreview); }
    if (cellPlace) { cellPlace.addEventListener('input', updateCellPreview); cellPlace.addEventListener('change', updateCellPreview); }

    // Порядок полей: ряд → место → штрихкод → имя → фото
    var focusOrder = [
      cellRow,
      cellPlace,
      document.getElementById('barcode'),
      document.getElementById('employeeName'),
      document.getElementById('photo')
    ].filter(Boolean);

    form.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      var el = document.activeElement;
      var idx = focusOrder.indexOf(el);
      if (idx === -1) return;
      e.preventDefault();
      var next = focusOrder[idx + 1] || focusOrder[0];
      next.focus();
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var row = (cellRow && cellRow.value) ? cellRow.value.trim() : '';
      var place = (cellPlace && cellPlace.value) ? cellPlace.value.trim() : '';
      if (!row || !place) {
        msgEl.textContent = 'Введите ряд и место в ряду';
        msgEl.className = 'msg msg--err';
        msgEl.style.display = 'block';
        return;
      }
      if (cellHidden) cellHidden.value = storagePrefix + '-' + row + '-' + place;

      msgEl.className = 'msg';
      msgEl.style.display = 'none';
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Отправка...';

      var fd = new FormData(form);
      fetch('/api/consolidation/complaints', { method: 'POST', body: fd })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            localStorage.setItem(STORAGE_KEY_ROW, row);
            localStorage.setItem(STORAGE_KEY_PREFIX, storagePrefix);
            var nameEl = document.getElementById('employeeName');
            if (nameEl && nameEl.value && nameEl.value.trim() !== '') {
              localStorage.setItem(STORAGE_KEY_EMPLOYEE_NAME, nameEl.value.trim());
            }
            msgEl.textContent = 'Жалоба отправлена! Спасибо.';
            msgEl.className = 'msg msg--ok';
            form.reset();
            cellRow.value = row;
            if (nameEl) {
              var savedName = localStorage.getItem(STORAGE_KEY_EMPLOYEE_NAME);
              if (savedName) nameEl.value = savedName;
            }
            updateCellPreview();
          } else {
            msgEl.textContent = 'Ошибка: ' + (data.error || 'Попробуйте снова');
            msgEl.className = 'msg msg--err';
          }
        })
        .catch(function(err) {
          msgEl.textContent = 'Ошибка сети: ' + err.message;
          msgEl.className = 'msg msg--err';
        })
        .finally(function() {
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Отправить';
        });
    });
  </script>
</body>
</html>
